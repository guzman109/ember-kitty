# vim:ft=kitty

## name:     Ember Light
## blurb:    A warm, monochrome light theme with a vivid coral spark.
## upstream: https://github.com/ember-theme/ember

# The basic colors
background              #e6dac4
foreground              #282418
selection_background    #c8b89c
selection_foreground    #282418

# Cursor colors
cursor                  #b84c30
cursor_text_color       #e6dac4

# URL underline color when hovering with mouse
url_color               #b84c30

# Kitty window border colors
active_border_color     #b84c30
inactive_border_color   #c8b89c
bell_border_color       #7a6820

# OS Window titlebar colors
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab bar colors
active_tab_foreground   #e6dac4
active_tab_background   #b84c30
inactive_tab_foreground #706070
inactive_tab_background #d4c8b0
tab_bar_background      #e6dac4

# Marks
mark1_foreground #e6dac4
mark1_background #b84c30
mark2_foreground #e6dac4
mark2_background #7a6820
mark3_foreground #e6dac4
mark3_background #3a6080

